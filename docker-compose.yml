services:

  # ── PHP-FPM + Nginx (single container via supervisord) ──────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: opticedge_app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-opticedge_credit}
      DB_USERNAME: ${DB_USERNAME:-opticedge}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    volumes:
      - app_storage:/var/www/html/storage
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opticedge_net

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: opticedge_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-opticedge_credit}
      MYSQL_USER: ${DB_USERNAME:-opticedge}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opticedge_net

  # ── phpMyAdmin (accessible at /database/) ────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: opticedge_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: https://credit.opticedgeafrica.net/database/
      UPLOAD_LIMIT: 50M
      HIDE_PHP_VERSION: 1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - opticedge_net

  # ── Certbot – SSL certificate renewal ────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: opticedge_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opticedge_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - opticedge_net

volumes:
  db_data:
  redis_data:
  app_storage:
  certbot_webroot:

networks:
  opticedge_net:
    driver: bridge
