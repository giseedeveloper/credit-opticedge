# ──────────────────────────────────────────────────────────────────────────────
# OPTICEDGE CREDIT - MAIN APP (HTTP)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip (Kuongeza Kasi) ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Let's Encrypt (Maandalizi ya SSL baadaye) ─────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Database Manager (phpMyAdmin) ─────────────────────────────────────────
    location ^~ /database/ {
        proxy_pass         http://phpmyadmin:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;

        proxy_redirect     off;
        sub_filter         'action="/'  'action="/database/';
        sub_filter         'href="/'    'href="/database/';
        sub_filter         'src="/'     'src="/database/';
        sub_filter_once    off;
        sub_filter_types   text/html;
    }

    # ── Static assets (Picha na CSS) ──────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Main Laravel entry (Ufunguo wa Mfumo) ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM (Mawasiliano na Laravel) ──────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    # ── Block hidden files (Usalama) ──────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
