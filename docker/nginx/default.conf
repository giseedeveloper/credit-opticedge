# ──────────────────────────────────────────────────────────────────────────────
# OPTICEDGE CREDIT — HTTP (ACME + redirect)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name credit.opticedgeafrica.net _;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# OPTICEDGE CREDIT — HTTPS (main app)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name credit.opticedgeafrica.net _;

    ssl_certificate     /etc/letsencrypt/live/credit.opticedgeafrica.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/credit.opticedgeafrica.net/privkey.pem;
    ssl_session_timeout 1d;

    root /var/www/html/public;
    index index.php;

    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ^~ /database/ {
        proxy_pass         http://phpmyadmin:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 90s;

        proxy_redirect     off;
        sub_filter         'action="/'  'action="/database/';
        sub_filter         'href="/'    'href="/database/';
        sub_filter         'src="/'     'src="/database/';
        sub_filter_once    off;
        sub_filter_types   text/html;
    }

    # Livewire 3 (/livewire/...) and Livewire 4 (/livewire-{hash}/...) asset routes
    location ^~ /livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /livewire- {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /flux/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param           HTTPS on;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
