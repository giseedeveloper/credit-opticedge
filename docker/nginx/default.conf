# ──────────────────────────────────────────────────────────────────────────────
# HTTP  →  redirect to HTTPS
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name credit.opticedgeafrica.net;

    # Allow Let's Encrypt ACME challenges (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# HTTPS  →  main app + /database/ proxy
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name credit.opticedgeafrica.net;

    # ── SSL certificates (Let's Encrypt via certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/credit.opticedgeafrica.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/credit.opticedgeafrica.net/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/credit.opticedgeafrica.net/chain.pem;

    # ── SSL hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    root  /var/www/html/public;
    index index.php;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Health check ──────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Database Manager (phpMyAdmin) ─────────────────────────────────────────
    # Accessible at: https://credit.opticedgeafrica.net/database/
    location ^~ /database/ {
        proxy_pass         http://phpmyadmin:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 90s;

        # Rewrite phpMyAdmin internal links to /database/ prefix
        proxy_redirect     off;
        sub_filter         'action="/'  'action="/database/';
        sub_filter         'href="/'    'href="/database/';
        sub_filter         'src="/'     'src="/database/';
        sub_filter_once    off;
        sub_filter_types   text/html;
    }

    # ── Static assets – long cache ────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Main Laravel entry ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
