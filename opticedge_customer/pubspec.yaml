name: opticedge_customer
description: Opticedge Customer — Self-service loan repayment app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/images/customer_app_icon_fullbleed.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - "assets/images/customer app logo.png"
