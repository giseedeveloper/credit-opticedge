name: opticedge_fo
description: Opticedge FO — Field Officer KYC Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Camera & Images
  camera: ^0.11.0
  image_picker: ^1.2.1
  cached_network_image: ^3.3.1

  # ML Kit
  google_mlkit_face_detection: ^0.13.2

  # UI & Animations
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.2.4

  # Biometric Auth
  local_auth: ^2.2.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  cupertino_icons: ^1.0.6
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: "assets/icons/fluent-color/frontoffice_app_icon_fullbleed.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - "assets/icons/fluent-color/03_opticedge_credit_front_office_app_icon_exact_transparent.png"
    - assets/images/
    - assets/icons/fluent-color/
